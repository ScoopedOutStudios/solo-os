name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  package-build:
    name: package-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Install built wheel
        run: |
          python -m pip install dist/*.whl
          solo-os --help

  cli-smoke:
    name: cli-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Run CLI help checks
        run: |
          python -m solo_os --help
          python -m solo_os init --help
          python -m solo_os verify --help
          python -m solo_os gh-brief --help
          python -m solo_os daily-triage --help

  compile:
    name: compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile package
        run: python -m compileall solo_os
